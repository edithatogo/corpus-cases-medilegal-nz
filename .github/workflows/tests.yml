name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Checkout sibling nlp-policy-nz dependency
        run: git clone --depth 1 https://github.com/edithatogo/nlp-policy-nz.git ../nlp-policy-nz
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        continue-on-error: ${{ matrix.python-version == '3.14' }}
        run: |
          set -euo pipefail
          uv sync --extra dev --frozen
      - name: Lint
        continue-on-error: true
        run: uv run ruff check src tests
      - name: Format check
        continue-on-error: true
        run: uv run ruff format --check src tests
      - name: Run tests
        continue-on-error: ${{ matrix.python-version == '3.14' }}
        run: uv run pytest -q --cov=corpus_cases_medilegal_nz --cov-report=term-missing
