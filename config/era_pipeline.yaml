pipeline:
  name: era
  description: "Employment Relations Authority (ERA) NZ Decisions Ingestion Pipeline"
  source_url: "https://www.era.govt.nz/"
  base_url: "https://www.era.govt.nz"
  paths:
    raw_dir: "data/raw/era"
    processed_dir: "data/processed"
  scraping:
    page_size: 10
    max_pages: 5
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) NZ-Medicolegal-Corpus-Sync"
    timeout: 30
  validation:
    required_metadata_fields:
      - "case_id"
      - "date"
      - "title"
      - "citation"
      - "url"
