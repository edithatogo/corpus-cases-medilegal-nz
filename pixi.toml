[project]
name = "corpus-cases-medilegal-nz"
version = "0.1.0"
description = "New Zealand medical-legal case corpus pipeline (HDC, HPDT, etc.)"
authors = ["Maintainer"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pip = "*"
vale = ">=3.0"
nodejs = ">=20"
git = "*"

[pypi-dependencies]
polars = ">=1.0.0"
pyarrow = ">=16.0.0"
pydantic = ">=2.0.0"
pydantic-settings = ">=2.0.0"
requests = ">=2.31.0"
beautifulsoup4 = ">=4.12.0"
defusedxml = ">=0.7.1"
huggingface_hub = ">=0.23.0"
click = ">=8.1.0"
typer = ">=0.26.7"
rich = ">=15.0.0"
ruff = ">=0.3.0"
pyright = ">=1.1.0"
pytest = ">=8.0"
pytest-cov = ">=5.0.0"
hypothesis = ">=6.90"
nlp-policy-nz = { path = "../nlp-policy-nz", editable = true }

[tasks]
install-git-hooks = "pre-commit install"
lint = "ruff check . && vale conductor/"
format = "ruff format ."
check-boundaries = "echo 'No tach config yet'"
check-complexity = "echo 'No complexipy config yet'"
test = "pytest"
coverage = "pytest --cov=src --cov-report=html --cov-report=xml --cov-fail-under=90"
typecheck = "pyright src"
check = { depends_on = ["lint", "format", "test", "typecheck"] }
